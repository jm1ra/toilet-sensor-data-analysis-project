<!DOCTYPE html>
<html>
    <head>
        <title>Login</title>
    </head>
    <body>
        <h1>
            Login
        </h1>
        <form name="loginForm" onsubmit="validateLogin()" method="post">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
            <br><br>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            <br><br>
            <input type="submit" value="Submit">
            <br><br>
        </form>
        <p id="debug1"></p>
        <p id="debug2"></p>
        <script>
            function validateLogin() {
                let usernameValue = document.getElementById("username").value;
                let passwordValue = document.getElementById("password").value;
                let textUsername = usernameValue;
                let textPassword = passwordValue;

                document.getElementById("debug1").innerHTML = textUsername;
                document.getElementById("debug2").innerHTML = textPassword;
            }
        </script>
    </body>
</html>
